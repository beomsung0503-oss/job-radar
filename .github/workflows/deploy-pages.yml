name: Deploy Job Radar

on:
  workflow_dispatch:
  schedule:
    - cron: "17 0,6,12,18 * * *"
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Restore the last deployed job pool
        run: curl --fail --silent --show-error --location --retry 3 "https://beomsung0503-oss.github.io/job-radar/data/jobs.js?run=${GITHUB_RUN_ID}" --output data/jobs.js || true

      - name: Refresh job data
        run: python scripts/collect_jobs.py --linkedin-queries 8 --linkedin-pages 2 --linkedin-target-companies 12 --linkedin-detail-limit 28 --official-companies 150 --max-age-days 45

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
